<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Novos Clientes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Avaliação de Novos Clientes</h2>
    
    <form id="formAvaliacao" method="POST" action="https://script.google.com/macros/s/AKfycbzIwlc1Ap1wWkpDfhSStNISC-XfJujtSZmd4no9vh9Hp-dLVQ6Vvb1cmGQc8rt9FoJlvw/exec">
        
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
        </div>

        <div class="form-group">
            <label for="cpf_cnpj">CPF / CNPJ:</label>
            <input type="text" id="cpf_cnpj" name="cpf_cnpj" placeholder="Digite seu CPF ou CNPJ">
        </div>

        <div class="form-group">
            <label for="produtos">Produtos Comprados:</label>
            <input type="text" id="produtos" name="produtos" placeholder="Ex: Produto A, Produto B">
        </div>

        <div class="form-group">
            <label for="experiencia">Experiência Geral:</label>
            <select id="experiencia" name="experiencia">
                <option value="">Selecione...</option>
                <option value="Excelente">Excelente</option>
                <option value="Bom">Bom</option>
                <option value="Regular">Regular</option>
                <option value="Ruim">Ruim</option>
            </select>
        </div>

        <div class="form-group">
            <label for="nps">Recompra (NPS - De 0 a 10):</label>
            <input type="text" id="nps" name="nps" placeholder="Ex: 10">
        </div>

        <div class="form-group">
            <label for="feedback">Feedbacks / Sugestões:</label>
            <textarea id="feedback" name="feedback" placeholder="Deixe seu comentário..."></textarea>
        </div>

        <button type="submit">Enviar Resposta</button>
    </form>
</div>

</body>
</html>
